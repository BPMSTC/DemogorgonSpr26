<div class="create-container">
  <h2>Create a New Festival</h2>
  
  <form [formGroup]="festivalForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="name">Festival Name <span aria-hidden="true">*</span></label>
      <input 
        type="text" 
        id="name" 
        formControlName="name" 
        [attr.aria-invalid]="submitted && f['name'].errors ? true : null"
        aria-required="true">
      <div *ngIf="submitted || f['name'].touched" class="error-messages">
        <small *ngIf="f['name'].errors?.['required']" class="error-text">Name is required.</small>
      </div>
    </div>

    <div class="form-group row">
      <div class="half-width">
        <label for="startDate">Start Date <span aria-hidden="true">*</span></label>
        <input type="date" id="startDate" formControlName="startDate" aria-required="true">
        <div *ngIf="submitted || f['startDate'].touched" class="error-messages">
          <small *ngIf="f['startDate'].errors?.['required']" class="error-text">Start date is required.</small>
        </div>
      </div>

      <div class="half-width">
        <label for="endDate">End Date <span aria-hidden="true">*</span></label>
        <input type="date" id="endDate" formControlName="endDate" aria-required="true">
        <div *ngIf="submitted || f['endDate'].touched" class="error-messages">
          <small *ngIf="f['endDate'].errors?.['required']" class="error-text">End date is required.</small>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="location">Location <span aria-hidden="true">*</span></label>
      <input type="text" id="location" formControlName="location" aria-required="true">
      <div *ngIf="submitted || f['location'].touched" class="error-messages">
        <small *ngIf="f['location'].errors?.['required']" class="error-text">Location is required.</small>
      </div>
    </div>

    <div class="button-group">
      <button type="button" class="btn-cancel" routerLink="/festivals">Cancel</button>
      <button type="submit" class="btn-submit" [disabled]="festivalForm.invalid">Save Festival</button>
    </div>
  </form>
</div>
